<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Microservices Demo - Netflix Style</title>
  <style>body { font-family: Arial; text-align: center; padding: 50px; background: #0a0a0a; color: #fff; }</style>
</head>
<body>
  <h1>🎬 Microservices Platform Demo</h1>
  <p>Frontend calling API Service...</p>
  <div id="result"></div>

  <script>
    fetch('http://localhost:3000/')
      .then(res => res.json())
      .then(data => {
        document.getElementById('result').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      })
      .catch(err => console.error(err));
  </script>
</body>
</html>
