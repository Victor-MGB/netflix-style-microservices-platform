version: '3.9'

services:
  api:
    build: ./app/api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WORKER_URL=http://worker:4000
    depends_on:
      - worker
    restart: unless-stopped

  worker:
    build: ./app/worker
    ports:
      - "4000:4000"   # <-- Expose worker to host
    environment:
      - NODE_ENV=development
      - FLASK_APP=app.py
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_ENV=development
    restart: unless-stopped
    # Optional: mount local folder for hot reload
    volumes:
      - ./app/worker:/app

  frontend:
    build: ./app/frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped